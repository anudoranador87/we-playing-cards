<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Cartas Estratégico</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Cartas del jugador -->
  <main id="playing-cards">
    <div class="card" data-nombre="Dragón"><h3>Dragón</h3><p class="counter">Coste: 20</p></div>
    <div class="card" data-nombre="Sirena"><h3>Sirena</h3><p class="counter">Coste: 15</p></div>
    <div class="card" data-nombre="Fenix"><h3>Fenix</h3><p class="counter">Coste: 15</p></div>
    <div class="card" data-nombre="Golem"><h3>Golem</h3><p class="counter">Coste: 10</p></div>
    <div class="card" data-nombre="Rayo"><h3>Rayo</h3><p class="counter">Coste: 30</p></div>
  </main>
  
  <div class="stats-container">
    <div class="player-stats">
        <h4>Jugador</h4>
        <div class="hp-bar-container"><div id="player-hp-bar-visual" class="bar hp" style="width: 100%;"></div></div>
        <div class="mana-bar-container"><div id="player-mana-bar" class="bar mana" style="width: 100%;"></div></div>
        <div id="player-status-icons" class="status-icons"></div>
    </div>

    <div class="cpu-stats">
        <h4>Enemigo</h4>
        <div class="hp-bar-container"><div id="cpu-hp-bar-visual" class="bar hp" style="width: 100%;"></div></div>
        <div id="cpu-status-icons" class="status-icons"></div>
    </div>
</div>

  <!-- Panel de acciones -->
  <section id="player-actions">
    <h3>Elige tu acción</h3>
    <button class="action" data-type="attack">Ataque</button>
    <button class="action" data-type="defense">Defensa</button>
    <button class="action" data-type="special-plus10">+10 Ataque</button>
    <button class="action" data-type="special-block">Bloquear enemigo</button>
  </section>

  <!-- Dado -->
  <section id="dice">
    <h3>Dado de Bono</h3>
    <button id="roll-dice">Tirar dado</button>
    <span id="dice-result">0</span>
  </section>

  <section id="cpu-field">
    <div id="cpu-card-slot" class="card">
        <h3>Enemigo</h3>
        <p class="counter">?</p>
    </div>
</section>

  <!-- Consola -->
  <section id="game-ui">
    <div id="turn">Turno: 1</div>
    <div id="log">Aquí se mostrarán los resultados de cada turno</div>
  </section>

<script src="script.js"></script>

</body>
</html>
