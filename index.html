<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head> 
<body>

  <main id="playing-cards">
    <div class="card" data-nombre = "Sirena">
      <div class="left">🔥</div>
      <div class="middle">🌿</div>
      <div class="right">⚡</div>
      <p>Nivel: <span class="counter">0</span></p>
    </div>

    <div class="card" data-nombre = "Dragón">
      <div class="left">☀️</div>
      <div class="middle">🌙</div>
      <div class="right">⭐</div>
      <p>Level: <span class="counter">0</span></p>
    </div>

    <div class="card" data-nombre= "Fénix">
      <div class="left">⚔️</div>
      <div class="middle">🛡️</div>
      <div class="right">🧪</div>
      <p>Nivel: <span class="counter">0</span></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
